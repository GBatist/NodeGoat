name: Mend SAST Scan

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

jobs:
  mend-sast:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Mend SAST Scan
      env:
        MEND_API_KEY: ${{ secrets.MEND_API_KEY }}
        MEND_ORG_TOKEN: ${{ secrets.MEND_ORG_TOKEN }}
        PROJECT_NAME: pipeline-scan-${{ github.repository }}-${{ github.sha }}
      run: |
        sudo curl https://downloads.mend.io/cli/linux_amd64/mend -o /usr/local/bin/mend && sudo chmod +x /usr/local/bin/mend
        mend code --api-key $MEND_API_KEY --org-token $MEND_ORG_TOKEN --d . --name $PROJECT_NAME
